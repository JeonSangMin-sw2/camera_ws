camera:
  Tf_to_marker_left:  [0.0, 0.07745, -0.06948, 89.45, 0.8, 0.0] # 고속형일 경우 y축에 0.0005 사라짐
  Tf_to_marker_right: [0.0,-0.07767, -0.07031, 90.56, 0.0, 181.43]
  # Tf_to_marker_left:  [0.0, 0.0775, -0.06677, 90.0, 0.0, 0.0] # 고속형일 경우 y축에 0.0005 사라짐
  # Tf_to_marker_right: [0.0,-0.0775, -0.06677,90.0, 0.0, 180.0]

  # Tf_to_marker_left:  [0.0, 0.099, -0.05317, 90.0, 0.0, 0.0]
  # Tf_to_marker_right: [0.0,-0.099, -0.05317,90.0, 0.0, 180.0]


  # Static transform from the head camera mount link to the camera.
  # `mount_to_cam` is the preferred key.
  # `T5_to_cam` is kept only for backward compatibility with older code.
  # Change `camera_mount_link` if this extrinsic is defined from another head link.
  camera_mount_link: link_head_2
  mount_to_cam: [0.047, 0.009, 0.057, -90.0, -1.0, -90.0]
  # T5_to_cam:    [0.035, 0.009, 0.057, -90.0, 0.0, -90.0]
  
  width: 1280
  height: 720
  fps: 30

thermal_compensation:
  enabled: false
  baseline_temp: 32.0
  focal_scale_per_deg: 0.00028
  pp_x_shift_per_deg: 0.035
  pp_y_shift_per_deg: -0.142

marker:
  cube:
    cube_size_mm: 40.0
    left_ids:
    - 10
    - 11
    - 12
    - 13
    - 14
    right_ids:
    - 30
    - 31
    - 32
    - 33
    - 34
  plate:
    left_ids:
    - 7
    right_ids:
    - 8
    plate_size_mm: 80.0
