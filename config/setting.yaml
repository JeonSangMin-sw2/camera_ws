  mount_to_cam: [0.047, 0.009, 0.057, -90.0, 0.0, -90.0]
  head_base_to_cam: [0.102, 0.009, 0.044, -90.0, 0.0, -90.0]
  
  width: 1280
  height: 720
  fps: 30

