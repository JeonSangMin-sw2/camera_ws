  # Tf_to_marker_right: [0.0,-0.099, -0.05317,90.0, 0.0, 180.0]
 

  # Camera extrinsic calibrations
  # `mount_to_cam`: used when head is included (base: camera_mount_link)
  # `T5_to_cam`: used for headless/torso-mount configurations (base: link_torso_5)
  camera_mount_link: link_head_2
  mount_to_cam: [0.047, 0.009, 0.057, -90.0, 0.0, -90.0]
  T5_to_cam: [0.124, 0.009, 0.175, -90.0, 0.0, -90.0]
  
  width: 1280
  height: 720
  fps: 30

thermal_compensation:
  enabled: false
  baseline_temp: 32.0
  focal_scale_per_deg: 0.00028
  pp_x_shift_per_deg: 0.035
  pp_y_shift_per_deg: -0.142

