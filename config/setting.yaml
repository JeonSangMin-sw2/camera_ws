camera:
  Tf_to_marker_left:  [0.00000, 0.07467, -0.02441, 90.18, -20.73, 0.23] # [0.00000, 0.07760, -0.06768, 89.48, 0.0, 1.4] # 고속형일 경우 y축에 0.0005 사라짐
  Tf_to_marker_right: [0.00000, -0.07503, -0.06757, 91.22, -5.61, 179.69]  # [0.00000, -0.07534, -0.06823, 90.20, 0.0, 179.74]
  # Tf_to_marker_left:  [0.0, 0.0775, -0.06677, 90.0, 0.0, 0.0] # 고속형일 경우 y축에 0.0005 사라짐
  # Tf_to_marker_right: [0.0-0.0775, -0.06677,90.0, 0.0, 180.0]

